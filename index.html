<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>群友买球计分板 · 手机测试版</title>
  <meta name="description" content="群友世界杯竞猜手机端测试页面">
  <link rel="icon" href="assets/worldcup-logo.jpeg" type="image/jpeg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="phone-shell" aria-label="手机端测试页面">
    <section class="screen active" id="screen-home">
      <header class="app-header">
        <div class="brand-lockup hero-title-stack">
          <img src="assets/hero-title-betting-cutout.png" alt="群友买球计分板" class="hero-title-cutout">
          <img src="assets/hero-subtitle-betting-cutout.png" alt="世界杯竞猜" class="hero-subtitle-cutout">
        </div>
      </header>

      <section class="hero-panel">
        <div class="section-title">
          <span>🏆 今日积分榜前三</span>
          <small>实时气氛组</small>
        </div>
        <div class="podium" id="podium"></div>
      </section>

      <section class="card">
        <div class="section-title">
          <span>🔥 排行榜速览</span>
          <small>今日积分 / 总积分</small>
        </div>
        <div class="mini-rank" id="miniRank"></div>
      </section>

      <section class="card">
        <div class="section-title">
          <span>⚽ 今日比赛</span>
          <small id="todayDate"></small>
        </div>
        <div class="match-list compact" id="homeMatches"></div>
      </section>

      <section class="last-update-card">
        <span id="lastUpdateText">最后更新：等待云端自动更新</span>
      </section>
    </section>

    <section class="screen" id="screen-rank">
      <header class="page-header sticker-header">
        <img src="assets/generated/title-rank-text.png" alt="排行榜" class="title-text">
        <img src="assets/generated/rank-mascot.png" alt="" class="header-mascot rank-mascot">
      </header>
      <div class="tab-switch">
        <button class="active" data-rank-tab="today">今日</button>
        <button data-rank-tab="week">本周</button>
        <button data-rank-tab="total">总榜</button>
      </div>
      <div class="leaderboard-table" id="leaderboard"></div>
    </section>

    <section class="screen" id="screen-matches">
      <header class="page-header sticker-header">
        <img src="assets/generated/title-matches-text.png" alt="比赛" class="title-text">
        <img src="assets/generated/panda.png" alt="" class="header-mascot">
      </header>
      <div class="date-bar"><span id="matchDate"></span></div>
      <div class="round-tabs" id="roundTabs"></div>
      <div class="match-list" id="matchList"></div>
    </section>

    <section class="screen" id="screen-ai">
      <header class="page-header sticker-header">
        <img src="assets/generated/title-ai-text.png" alt="AI点评" class="title-text">
        <img src="assets/generated/ai-robot.png" alt="" class="header-mascot">
      </header>
      <div class="update-bar" id="aiUpdateBar">正在生成今日点评...</div>
      <div class="comment-list" id="aiComments"></div>
      <div class="duo-board">
        <div class="danger-board">
          <h3>翻车榜（今日）</h3>
          <div id="curseBoard"></div>
        </div>
        <div class="god-board">
          <h3>封神榜（今日）</h3>
          <div id="godBoard"></div>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-calculator">
      <header class="page-header sticker-header">
        <img src="assets/generated/title-calculator-text.png" alt="计算器" class="title-text">
        <img src="assets/generated/doge.png" alt="" class="header-mascot">
      </header>
      <section class="calculator-card">
        <div class="calc-toolbar">
          <div class="calc-status" id="calcStatus">正在加载赔率数据...</div>
          <button class="calc-clear-btn" id="calcClearBtn" type="button">清空</button>
        </div>
        <div class="odds-match-list" id="oddsMatchList"></div>
        <div class="calc-row compact">
          <label for="stakeInput">投注倍数</label>
          <input id="stakeInput" type="number" min="0" step="1" value="0">
        </div>
        <div class="calc-pass-buttons" id="calcPassButtons"></div>
        <div class="calc-stats" id="calcStats"></div>
        <div class="calc-result">
          <span>预计投入</span>
          <strong id="returnAmount">0.00</strong>
        </div>
        <div class="calc-result profit">
          <span>理论最高</span>
          <strong id="profitAmount">0.00</strong>
        </div>
        <div class="selected-odds" id="selectedOdds"></div>
        <p class="calc-note">这里只做娱乐测试，不代表任何投注建议。</p>
      </section>
    </section>

    <nav class="bottom-nav" aria-label="底部导航">
      <button class="active" data-nav="home"><span>🏠</span>首页</button>
      <button data-nav="rank"><span>🏆</span>排行榜</button>
      <button data-nav="matches"><span>⚽</span>比赛</button>
      <button data-nav="ai"><span>🤖</span>AI点评</button>
      <button data-nav="calculator"><span>🔢</span>计算器</button>
    </nav>
  </main>

  <script src="script.js"></script>
</body>
</html>
